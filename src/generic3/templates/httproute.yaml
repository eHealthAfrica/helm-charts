{{- if .Values.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "generic.fullname" . }}
  labels:
    app: {{ template "generic.fullname" . }}
    chart: {{ template "generic.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
  annotations:
    cert-manager.io/common-name: {{ .Values.url }}
    external-dns.alpha.kubernetes.io/hostname: {{ .Values.url }}
    {{- with .Values.httpRoute.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  hostnames:
    - {{ .Values.url | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.path | default "/" }}
      backendRefs:
        - name: {{ template "generic.fullname" . }}
          port: {{ .Values.service.externalPort }}
---
# HTTP to HTTPS redirect
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ template "generic.fullname" . }}-http-redirect
  labels:
    app: {{ template "generic.fullname" . }}
    chart: {{ template "generic.chart" . }}
    heritage: {{ .Release.Service }}
    release: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ (index .Values.httpRoute.parentRefs 0).name }}
      {{- if (index .Values.httpRoute.parentRefs 0).namespace }}
      namespace: {{ (index .Values.httpRoute.parentRefs 0).namespace }}
      {{- end }}
      sectionName: http
  hostnames:
    - {{ .Values.url | quote }}
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
{{- end }}
